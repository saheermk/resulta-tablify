name: Deploy Vite App to GitHub Pages

on:
  # Trigger the workflow on pushes to your default branch
  push:
    branches: ["main"] # Change to "master" if that is your default branch
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single build job
  build:
    runs-on: ubuntu-latest # Since you use Linux, you'll feel right at home with the Ubuntu runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Update this if you use a different Node version
          cache: 'npm' # Change to 'yarn' or 'pnpm' if you don't use npm
          
      - name: Install dependencies
        run: npm ci # 'npm ci' is preferred for CI environments, but 'npm install' works too
        
      - name: Build project
        run: npm run build
        
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite outputs the build files to the 'dist' directory by default
          path: './dist' 

  # Single deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
